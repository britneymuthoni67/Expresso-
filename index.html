<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Graduation Announcement</title>

  <style>
    body {
      margin: 0;
      padding: 0;
      font-family: Arial, sans-serif;
      background: linear-gradient(to right, #000000, #1a1a1a);
      color: white;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      text-align: center;
    }

    .card {
      background: rgba(255,255,255,0.1);
      padding: 40px;
      border-radius: 20px;
      box-shadow: 0 0 20px rgba(255,255,255,0.2);
      width: 80%;
      max-width: 500px;
    }

    h1 {
      font-size: 3rem;
      margin-bottom: 10px;
      color: gold;
    }

    h2 {
      font-size: 1.5rem;
      margin-bottom: 20px;
    }

    p {
      font-size: 1.1rem;
      line-height: 1.6;
    }

    .emoji {
      font-size: 4rem;
    }
  </style>
</head>
<body>

  <div class="card">
    <div class="emoji">🎓</div>
    <h1>I'M GRADUATING!</h1>
    <h2>Class of 2026</h2>

    <p>
      The late nights, stress, assignments and hard work finally paid off.
      Your girl did it 💫
    </p>

    <p>
      Thank you to everyone who supported me on this journey ❤️
    </p>
  </div>

</body>
</html>
